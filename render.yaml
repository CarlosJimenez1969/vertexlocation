# =====================================================================
#  VertexLocation — Blueprint de Render (Fase 1: solo app web)
#  Crea: 1 base de datos PostgreSQL + 1 servicio web (Docker).
#  Los valores con `sync: false` se ingresan manualmente en el dashboard
#  (no se guardan en el repo): contraseñas/secretos.
# =====================================================================
databases:
  - name: vertexlocation-db
    databaseName: vertexlocation
    user: vertexlocation
    plan: free

services:
  - type: web
    name: vertexlocation
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Base de datos (Render la inyecta desde la BD de arriba)
      - key: DATABASE_URL
        fromDatabase:
          name: vertexlocation-db
          property: connectionString

      # App
      - key: ENV
        value: production
      - key: DEBUG
        value: "false"

      # Fase 1: sin hardware GPS (no hay servidor Traccar)
      - key: TRACCAR_ENABLED
        value: "false"

      # Seguridad: Render genera un secreto JWT fuerte
      - key: JWT_SECRET
        generateValue: true

      # URLs públicas (la app prefiere RENDER_EXTERNAL_URL en runtime)
      - key: FRONTEND_URL
        value: https://vertexlocation.onrender.com
      - key: CORS_ORIGINS
        value: https://vertexlocation.onrender.com

      # Admin inicial (la contraseña se ingresa en el dashboard)
      - key: ADMIN_EMAIL
        value: cijj1969@gmail.com
      - key: ADMIN_NAME
        value: Carlos
      - key: ADMIN_PASSWORD
        sync: false

      # Correo (Gmail SMTP). La app password se ingresa en el dashboard.
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_TLS
        value: "true"
      - key: SMTP_USER
        value: cijj1969@gmail.com
      - key: SMTP_FROM
        value: VertexLocation <cijj1969@gmail.com>
      - key: SMTP_PASSWORD
        sync: false
